version: '3.8'

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_analytics
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE_PATH=/metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    restart: always